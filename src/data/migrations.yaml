# Corporate Primary   - 2563eb
# Corporate Secondary - fafafa


siteTitle: Quark's Bar Systems Migration
siteDescription: Modernizing bar operations to Federation-standard systems across holosuites, replicators, and point-of-sale.

# Optional banner override. Any field you omit falls back to the auto-computed
# value derived from activity statuses. Remove the whole block to fully auto-compute.
# level options: green | blue | red | gray
banner:
  label: "Migrations In Progress"
  description: "Quark is watching closely."
  level: blue

# Statuses are 
# - not-started
# - in-progress
# - completed

activities:
  - id: holosuite-modernization
    name: Holosuite Modernization
    description: Migrate holosuite programs from Cardassian legacy systems to Federation-compatible format.
    status: in-progress
    tasks:
      - name: Recalibrate safety protocols
        status: in-progress
      - name: Deploy new payment terminal — latinum and credit
        status: completed
      - name: Stress test Holosuite 3
        status: not-started


  - id: replicator-overhaul
    name: Replicator System Overhaul
    description: Migrate System Accounts.
    status: not-started
    tasks:
      - name: Audit current menu
        status: not-started
      - name: Migrate recipe database from Terok Nor era storage to modern isolinear format
        status: not-started
      - name: Integrate dynamic pricing module for Quark
        status: not-started
      - name: Investigate root beer taste
        status: not-started


# Optional support/help section. Omit the block to hide the section entirely.
